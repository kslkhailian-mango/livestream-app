<!DOCTYPE html>
<html>
<head>
    <title>Penglam Live</title>
    <style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    position: relative;
}

/* ===== NAVBAR ===== */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 60px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    color: #ff4fd8;
}

.topActions {
    position: fixed;
    top: 20px;
    right: 25px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2000;
}

.profileBtn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
    color: white;
    cursor: pointer;
    font-weight: bold;
    backdrop-filter: blur(10px);
}

.goLiveBtn {
    height: 48px;
    padding: 0 22px;
    border: none;
    border-radius: 999px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, #ff4fd8, #ff6b6b);
    box-shadow: 0 0 15px rgba(255,80,180,.5);
}

/* ===== HERO ===== */
.hero {
    text-align: center;
    padding: 90px 20px 35px;
}

.hero h1 {
    font-size: 60px;
    margin: 0 0 15px;
}

.hero p {
    font-size: 20px;
    color: #ddd;
}

/* ===== LOGIN BOX ===== */
.hero-login {
    position: fixed;
    top: 95px;
    right: 25px;
    width: 320px;
    padding: 22px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 18px rgba(0,255,255,0.5);
    text-align: center;
    z-index: 1500;
}

.hero-login h2 {
    margin-top: 0;
}

.hero-login input {
    width: 92%;
    padding: 13px;
    margin: 8px 0;
    border: none;
    border-radius: 12px;
    outline: none;
}

.hero-login button {
    width: 95%;
    padding: 13px;
    margin-top: 8px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #ff4d94, #00eaff);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.hero-login a {
    color: #00eaff;
    font-weight: bold;
}

/* ===== LIVE SECTION ===== */
.section-title {
    text-align: center;
    color: white;
    margin: 50px 0 20px;
    font-size: 32px;
}

.live-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 22px;
    justify-content: center;
    padding: 0 30px;
}

.card {
    width: 280px;
    background: #1a1a1a;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,212,255,0.4);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 0;
}

.card h3 {
    margin: 10px 12px;
}

.live-badge {
    background: red;
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    display: inline-block;
    margin: 12px;
}

.live-card {
    width: 280px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
    backdrop-filter: blur(10px);
}

.live-card:hover {
    transform: translateY(-5px);
}

.live-thumb {
    height: 220px;
    background: linear-gradient(135deg,#ff4d6d,#6a5cff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
}

.live-info {
    padding: 15px;
}

.live-title {
    font-size: 18px;
    font-weight: bold;
    color: white;
}

.live-viewers {
    color: #ddd;
    margin-top: 5px;
}

/* ===== GENERAL BUTTONS / INPUTS ===== */
input {
    font-size: 16px;
}

.main-btn {
    width: 100%;
    padding: 15px;
    margin-top: 12px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(90deg, #ff4fd8, #00d4ff);
    color: white;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
}

.secondary-btn {
    background: transparent;
    border: 1px solid white;
}

/* ===== FEATURES ===== */
.features {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 40px 20px;
}

.feature {
    width: 220px;
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
}

.feature h3 {
    color: #00d4ff;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    color: #bbb;
    padding: 30px;
    margin-top: 60px;
}
@media (max-width: 1200px) {
    .hero-login {
        position: static;
        width: 320px;
        max-width: 90%;
        margin: 25px auto 40px auto;
    }

    .topActions {
        position: fixed;
        top: 20px;
        right: 25px;
    }

    .hero h1 {
        font-size: 42px;
    }
}
    </style>
    
</head>
<body>

<div class="navbar">
    <div class="logo">🔥 Penglam Live</div>  
    <div class="topActions">

    <button id="myProfileBtn" class="profileBtn" onclick="goMyProfile()">
        My Profile
    </button>

    <button class="goLiveBtn" onclick="goLive()">
        🔴 Go Live
    </button>

</div>
</div>
<div class="hero">
    <h1>Welcome to Penglam Live</h1>
    <p>Watch live streams or start your own live broadcast.</p>
</div>
  <div class="hero-login" id="loginBox">
  <h2>Join Penglam Live</h2>

  <input type="text" id="loginUser" placeholder="Username">
  <input type="password" id="loginPass" placeholder="Password">

  <button onclick="quickLogin()">Login & Profile</button>

  <p>
    No account?
    <a href="/register.html">Register</a>
  </p>
</div>  
</div>

<h2 class="section-title">🔥 Live Now</h2>

<div id="liveGrid" class="live-grid"></div>
</div>

</div>

<footer>
 
</footer>
<script>
</script>
<script>
window.onload = function () {
  const username = localStorage.getItem("username");
  const avatar = localStorage.getItem("avatar");

  const loginBox = document.getElementById("loginBox");
  const myProfileBtn = document.getElementById("myProfileBtn");
  const navAvatar = document.getElementById("navAvatar");

  if (username) {
    if (loginBox) loginBox.style.display = "none";
    if (myProfileBtn) myProfileBtn.style.display = "flex";

    if (navAvatar) {
      navAvatar.style.display = "block";
      navAvatar.src = avatar || "/default-avatar.png";

      navAvatar.onerror = function () {
        this.onerror = null;
        this.src = "/default-avatar.png";
      };
    }
  } else {
    if (loginBox) loginBox.style.display = "block";
    if (myProfileBtn) myProfileBtn.style.display = "none";
    if (navAvatar) navAvatar.style.display = "none";
  }
};

async function quickLogin() {
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value.trim();

  if (!username || !password) {
    alert("Please enter username and password");
    return;
  }

  const res = await fetch("/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("username", username);

    if (data.user && data.user.avatar) {
      localStorage.setItem("avatar", data.user.avatar);
    } else if (data.avatar) {
      localStorage.setItem("avatar", data.avatar);
    } else {
      localStorage.setItem("avatar", "/default-avatar.png");
    }

    window.location.href = "/profile.html?username=" + encodeURIComponent(username);
  } else {
    alert(data.message || "Login failed");
  }
}

function goRegister() {
  window.location.href = "/register.html";
}

function goLogin() {
  window.location.href = "/profile.html";
}

function goProfile() {
  window.location.href = "/profile.html";
}

function goLive() {
  const username = localStorage.getItem("username");

  if (!username) {
    const input = document.getElementById("loginUser");
    if (input) input.focus();
    return;
  }

  window.location.href = "/index.html?room=" + encodeURIComponent(username);
}

function goMainRoom() {
  goLive();
}

function goMyProfile() {
  const username = localStorage.getItem("username");

  if (!username) {
    window.location.href = "/login.html";
    return;
  }

  window.location.href = "/profile.html?username=" + encodeURIComponent(username);
}

async function loadLiveRooms() {
  const res = await fetch("/live-rooms");
  const rooms = await res.json();

  const box = document.getElementById("liveGrid");

  if (rooms.length === 0) {
    box.innerHTML = "<p>No one is live right now.</p>";
    return;
  }

  box.innerHTML = rooms.map(room => `
    <div class="live-card" onclick="joinRoom('${room.roomId || room}')">
      <div class="live-thumb">
      <img src="${room.avatar || '/default-avatar.png'}">
     </div>

      <div class="live-info">
        <span class="live-badge">🔴 LIVE</span>

        <div class="live-title">
          ${room.host || room.streamer || room.roomId || room} Live
        </div>

        <div class="live-viewers">
          👁️ ${room.viewerCount || room.viewers || 0} Watching
        </div>
      </div>
    </div>
  `).join("");
}

loadLiveRooms();
setInterval(loadLiveRooms, 3000);

function joinRoom(roomId) {
  window.location.href =
    "/index.html?room=" + encodeURIComponent(roomId) + "&watch=1";
}
</script>
<script src="/socket.io/socket.io.js"></script>
<script>
</script>
<footer>
     © 2026 Penglam Live — Built by KSL
</footer>  
</body>
</html>
