<!DOCTYPE html>

    <style>
        .live-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}
.card{
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px #00d4ff;
}
.live-card{
    background: rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    backdrop-filter:blur(10px);
}

.live-card:hover{
    transform:translateY(-5px);
}

.live-thumb{
    height:220px;
    background:linear-gradient(135deg,#ff4d6d,#6a5cff);

    align-items:center;
    justify-content:center;

.live-info{

}

.live-title{

}

.live-viewers{

}

.live-badge{

    background:red;

    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    margin-bottom:10px;
}

<body>

<div class="navbar">
    <div class="logo">🔥 Penglam Live</div>
    <button class="nav-btn" onclick="goMainRoom()">🔴 Go Live</button>
</div>
<div class="hero">
    <h1>Welcome to Penglam Live</h1>
    <p>Watch live streams or start your own live broadcast.</p>
</div>
  <div class="hero-login">
  <h2>Join Penglam Live</h2>

  <input type="text" id="loginUser" placeholder="Username">
  <input type="password" id="loginPass" placeholder="Password">

  <button onclick="quickLogin()">Login & Profile</button>

  <p>
    No account?
    <a href="/register.html">Register</a>
  </p>
</div>  
</div>

<h2 class="section-title">🔥 Live Now</h2>

<div id="liveGrid" class="live-grid"></div>
</div>

</div>

<footer>
 
</footer>
<script>
</script>
<script>
    async function quickLogin() {
  const username = document.getElementById("loginUser").value.trim();
  const password = document.getElementById("loginPass").value.trim();

  if (!username || !password) {
    alert("Please enter username and password");
    return;
  }

  const res = await fetch("/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
  localStorage.setItem("username", username);
  alert("Login success");
  window.location.href = "/home.html";
  } else {
    alert("Login failed");
  }
}
function goRegister() {
    window.location.href = "/register.html";
}
function goLogin() {
    window.location.href = "/profile.html";
}

function goProfile() {
    window.location.href = "/profile.html";
}    
function createRoom() {
    const room = document.getElementById("roomInput").value.trim();

    if (!room) {
        alert("Enter your live room name first");
        return;
    }

    window.location.href = "/index.html?room=" + encodeURIComponent(room);
}

function goMainRoom() {
    const username = localStorage.getItem("username");

    if (!username) {
        alert("Please login first");
        window.location.href = "/login.html";
        return;
    }

    window.location.href = "/index.html?room=" + encodeURIComponent(username);
}
async function loadLiveRooms() {
    const res = await fetch("/live-rooms");
    const rooms = await res.json();

  const box = document.getElementById("liveGrid");

    if (rooms.length === 0) {
        box.innerHTML = "<p>No one is live right now.</p>";
        return;
    }

box.innerHTML = rooms.map(room => `
<div class="live-card"
onclick="window.location.href='/index.html?room=${room.roomId}&watch=1'">

    <div class="live-thumb">
        🎥<img src="${room.avatar || '/default-avatar.png'}" width="60" height="60">
    </div>

    <div class="live-info">
        <div class="live-badge">LIVE</div>

        <div class="live-title">
            ${room.title}
        </div>

        <div class="live-viewers">
            👥 ${room.viewers} watching
        </div>
    </div>

</div>
`).join("");
}

loadLiveRooms();
setInterval(loadLiveRooms, 3000);
function joinRoom(roomId) {
    window.location.href =
        "/index.html?room=" + roomId + "&watch=1";
}
</script>
