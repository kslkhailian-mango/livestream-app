<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <style>


.navbar{
    background:#222;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#00d4ff;
    font-size:24px;
    font-weight:bold;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
}

.video-section{
    flex:3;
}

.chat-section{
    flex:1;
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
}

video{
    width:100%;
    max-width:900px;
    border-radius:15px;
    border:2px solid #00d4ff;
}

button{
    background:#00d4ff;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

input{
    padding:8px;
    border-radius:5px;
    border:none;
}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#111;
  color:white;
  min-height:100vh;
}

.profile-card{
  width:350px;
  margin:40px auto;
  padding:25px;
  text-align:center;
  background:#1b1b1b;
  border-radius:18px;
  box-shadow:0 0 20px cyan;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin:20px 0;
}

.stats div{
  background:#222;
  padding:10px;
  border-radius:12px;
  width:30%;
}

button{
  margin:6px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:cyan;
  cursor:pointer;
}

textarea{
  width:90%;
  height:70px;
  border-radius:8px;
  padding:10px;
}
</style>
</head>
<body>
<div class="navbar">
  <div class="logo">🔥 Penglam Live</div>

  <div>
    <button onclick="goHome()">Home</button>
    <button onclick="goLive()">Go Live</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>
<div class="profile-card">

  <img
    id="avatar"
    src="/default-avatar.png"
    width="130"
    height="130"
    alt="avatar"
    style="border-radius:50%; object-fit:cover;"
  >

  <h2 id="profileUsername">Loading...</h2>
  <p id="bio"></p>

  <div class="stats">
    <div><h3 id="followers">0</h3><p>Followers</p></div>
    <div><h3 id="following">0</h3><p>Following</p></div>
    <div><h3 id="coins">0</h3><p>Coins</p></div>
  </div>

  <button onclick="addCoins(100)">+100 Coins</button>

  <h3>Edit Profile</h3>

  <input type="file" id="avatarFile">
  <button onclick="uploadAvatar()">Upload Photo</button>

  <br><br>

  <textarea id="bioInput" placeholder="Write your bio"></textarea>
  <br>
  <button onclick="updateProfile()">
    Save Bio
</button>
  <h3>Send Gift</h3>

<div id="giftBox">
  <button onclick="sendGift('Rose 🌹',10)">
    Rose 🌹 +10
  </button>

  <button onclick="sendGift('Heart 💗',50)">
    Heart 💗 +50
  </button>

  <button onclick="sendGift('Lion 🦁',1000)">
    Lion 🦁 +1000
  </button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script> 
<script>
    const socket = io();

const username = localStorage.getItem("username");

function goHome() {
    window.location.href = "/home.html";
}

function goLive() {
    const username = localStorage.getItem("username");

    if (!username) {
        window.location.href = "/home.html";
        return;
    }

    window.location.href =
        "/index.html?room=" + encodeURIComponent(username);
}

function logout() {
    localStorage.clear();
    window.location.href = "/home.html";
}

socket.on("gift-received", data => {
    const giftBox = document.getElementById("giftBox");

    if (giftBox) {
        giftBox.innerHTML +=
            `<p>${data.username} received ${data.giftName} +${data.amount} coins</p>`;
    }
});

async function loadProfile() {

    const res = await fetch(`/profile/${username}`);
    const data = await res.json();
    console.log(data);

    if (data.success) {

        document.getElementById("profileUsername").innerText =
            data.username;

        const avatarImg = document.getElementById("avatar");
       avatarImg.src = data.avatar || "/default-avatar.png";
       avatarImg.onerror = function () {
        this.onerror = null;
       this.src = "/default-avatar.png";
       };

        document.getElementById("followers").innerText =
            "Followers: " + data.followers;

        document.getElementById("following").innerText =
            "Following: " + data.following;

        document.getElementById("coins").innerText =
            "Coins: " + data.coins;

        document.getElementById("bio").innerText =
            data.bio;
    }
}
async function updateProfile() {
    const bio = document.getElementById("bioInput").value;
    const username = localStorage.getItem("username");

    const res = await fetch(`/update-profile/${username}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            bio
        })
    });

    const data = await res.json();

    if (data.success) {
        alert("Profile Updated");
        loadProfile();
    } else {
        alert("Update Failed");
    }
}
async function followUser() {
  const res = await fetch(`/follow/${username}`, {
    method: "POST"
  });

  const data = await res.json();
  console.log("follow data:", data);

  if (data.success) {
    document.getElementById("followers").innerText =
      "Followers: " + data.followers;
  } else {
    alert("Follow failed");
  }
}

async function unfollowUser() {
  const res = await fetch(`/unfollow/${username}`, {
    method: "POST"
  });

  const data = await res.json();
  console.log("unfollow data:", data);

  if (data.success) {
    document.getElementById("followers").innerText =
      "Followers: " + data.followers;
  } else {
    alert("Unfollow failed");
  }
}
async function addCoins(amount) {

  const res = await fetch(`/add-coins/${username}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      amount: amount
    })
  });

  const data = await res.json();

  if (data.success) {

    document.getElementById("coins").innerText =
      "Coins: " + data.coins;

  } else {
    alert("Failed");
  }
}
async function sendGift(giftName, amount) {
  const res = await fetch(`/send-gift/${username}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ giftName, amount })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("coins").innerText =
      "Coins: " + data.coins;
  }
}

loadProfile();
async function uploadAvatar() {

    const file =
        document.getElementById("avatarFile").files[0];

    const username =
        localStorage.getItem("username");

    const formData = new FormData();

    formData.append("avatar", file);
    formData.append("username", username);

    const res = await fetch("/upload-avatar", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (data.success) {

        document.getElementById("avatar").src =
            data.avatar;
        localStorage.setItem("avatar", data.avatar);
        alert("Photo uploaded!");
    }
}
</script>

</body>
</html>
