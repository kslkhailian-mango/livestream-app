<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <style>
        body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

.navbar{
    background:#222;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#00d4ff;
    font-size:24px;
    font-weight:bold;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
}

.video-section{
    flex:3;
}

.chat-section{
    flex:1;
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
}

video{
    width:100%;
    max-width:900px;
    border-radius:15px;
    border:2px solid #00d4ff;
}

button{
    background:#00d4ff;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

input{
    padding:8px;
    border-radius:5px;
    border:none;
}
</style>
</head>
<body>
<div class="navbar">
    <div class="logo">LiveStream App</div>
    <div>
        <button onclick="location.href='profile.html'">
            Profile
        </button>
    </div>
</div>
<h1>User Profile</h1>
<h2 id="profileUsername">Loading...</h2>
<img id="avatar" width="120" alt="avatar">

<h3 id="followers">Followers: 0</h3>
<h3 id="following">Following: 0</h3>
<h3 id="coins">Coins: 0</h3>
<button onclick="addCoins(100)">
  +100 Coins
</button>
<p id="bio"></p>
<h3>Edit Profile</h3>
<button onclick="sendGift('Rose 🌹', 10)">Rose 🌹 +10</button>
<button onclick="sendGift('Heart ❤️', 50)">Heart ❤️ +50</button>
<button onclick="sendGift('Lion 🦁', 1000)">Lion 🦁 +1000</button>

<div id="giftBox"></div>
<input id="avatarInput" placeholder="Avatar image path">
<br><br>

<textarea id="bioInput" placeholder="Write your bio"></textarea>
<br><br>

<button onclick="updateProfile()">Save Profile</button>

<button onclick="followUser()">
  Follow
</button>

<button onclick="unfollowUser()">
  Unfollow
</button>
<script src="/socket.io/socket.io.js"></script> 
<script>
    const socket = io();
    const username = localStorage.getItem("username");
 socket.on("gift-received", data => {
  document.getElementById("giftBox").innerHTML +=
    `<p>${data.username} received ${data.giftName} +${data.amount} coins</p>`;
});
async function loadProfile() {

    const res = await fetch(`/profile/${username}`);
    const data = await res.json();

    if (data.success) {

        document.getElementById("profileUsername").innerText =
            data.username;

        document.getElementById("avatar").src =
            data.avatar;

        document.getElementById("followers").innerText =
            "Followers: " + data.followers;

        document.getElementById("following").innerText =
            "Following: " + data.following;

        document.getElementById("coins").innerText =
            "Coins: " + data.coins;

        document.getElementById("bio").innerText =
            data.bio;
    }
}
async function updateProfile() {

    const avatar = document.getElementById("avatarInput").value;
    const bio = document.getElementById("bioInput").value;

    const res = await fetch(`/update-profile/${username}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            avatar,
            bio
        })
    });

    const data = await res.json();

    if(data.success){
        alert("Profile Updated");
        loadProfile();
    } else {
        alert("Update Failed");
    }
}
async function followUser() {
  const res = await fetch(`/follow/${username}`, {
    method: "POST"
  });

  const data = await res.json();
  console.log("follow data:", data);

  if (data.success) {
    document.getElementById("followers").innerText =
      "Followers: " + data.followers;
  } else {
    alert("Follow failed");
  }
}

async function unfollowUser() {
  const res = await fetch(`/unfollow/${username}`, {
    method: "POST"
  });

  const data = await res.json();
  console.log("unfollow data:", data);

  if (data.success) {
    document.getElementById("followers").innerText =
      "Followers: " + data.followers;
  } else {
    alert("Unfollow failed");
  }
}
async function addCoins(amount) {

  const res = await fetch(`/add-coins/${username}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      amount: amount
    })
  });

  const data = await res.json();

  if (data.success) {

    document.getElementById("coins").innerText =
      "Coins: " + data.coins;

  } else {
    alert("Failed");
  }
}
async function sendGift(giftName, amount) {
  const res = await fetch(`/send-gift/${username}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ giftName, amount })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("coins").innerText =
      "Coins: " + data.coins;
  }
}

loadProfile();
</script>

</body>
</html>
