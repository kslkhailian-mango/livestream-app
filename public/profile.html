<!DOCTYPE html>
<html>
<head>
  <title>Penglam Profile</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #111827;
      font-family: Arial, sans-serif;
    }

    .phone {
      width: min(100vw, 520px);
      min-height: 100vh;
      margin: auto;
      background: #f7f4e9;
      overflow: hidden;
    }

    .cover {
      width: 100%;
      height: 260px;
      position: relative;
      overflow: hidden;
      background: #222;
    }

    #coverPhoto {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .topNav {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      z-index: 5;
    }

    .navBtn {
      background: rgba(0,0,0,0.35);
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      text-align: center;
      line-height: 34px;
      font-weight: bold;
      cursor: pointer;
    }

    .profileBody {
      padding: 0 22px 28px;
      margin-top: -82px;
      position: relative;
      z-index: 10;
    }

    .profileTop {
      display: flex;
      align-items: flex-end;
      gap: 14px;
    }

    .avatarSide {
      width: 130px;
      text-align: center;
      flex-shrink: 0;
    }

    .avatarBox {
      position: relative;
      width: 120px;
      height: 120px;
      margin: auto;
    }

    #profileAvatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid white;
      object-fit: cover;
      background: #111;
    }

    .levelMini {
      position: absolute;
      right: 0;
      bottom: 8px;
      background: #3b82f6;
      color: white;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: bold;
    }

    .profileId {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 6px;
      background: rgba(255,255,255,0.95);
      color: #4b5563;
      font-size: 13px;
      font-weight: 800;
      padding: 5px 11px;
      border-radius: 999px;
      border: 1px solid rgba(139,92,246,0.35);
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }

    .nameSide{
    flex:1;
    min-width:0;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    margin-top:20px;   /* အောက်ကိုချ */
    transform: translateX(-60px);
}

    .nameFrame{
    width:100%;
    max-width:245px;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:10px 18px;

    border-radius:20px;
    background:#fff;
    border:2px solid #8b5cf6;

    margin-bottom:8px;
}
    .nameFrame h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f59e0b;
      text-shadow: 0 0 5px rgba(245,158,11,.35);
    }

    .badgeRow {
      margin-top: 2px;
      text-align: center;
    }

    .vipBadge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(90deg, #f59e0b, #facc15);
      color: white;
      font-size: 13px;
      font-weight: 900;
      padding: 5px 13px;
      border-radius: 999px;
      box-shadow: 0 3px 10px rgba(245,158,11,.35);
    }

    .guildRow {
      margin-top: 8px;
      text-align: center;
    }

    .guildBadge {
      display: inline-flex;
      background: #10b981;
      color: white;
      font-size: 12px;
      font-weight: 800;
      padding: 5px 12px;
      border-radius: 999px;
    }
    
    .actionRow {
      display: flex;
      gap: 12px;
      margin: 18px 0;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .actionRow button,
    .bottomBtns button {
      flex: 1;
      padding: 12px;
      border-radius: 13px;
      background: #1f2937;
      color: white;
    }

    .tabs {
      display: flex;
      gap: 26px;
      font-size: 22px;
      margin: 18px 0;
    }

    .tab {
      color: #888;
      font-weight: bold;
    }

    .tab.active {
      color: #111;
      border-bottom: 3px solid #7c3aed;
      padding-bottom: 8px;
    }

    .coinRow {
      display: flex;
      gap: 12px;
    }

    .coinCard {
      flex: 1;
      background: white;
      border-radius: 18px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }

    .coinCard h2 {
      margin: 10px 0 0;
      font-size: 28px;
    }

    .goldText { color: #f59e0b; }
    .silverText { color: #6366f1; }

    .stats {
      display: flex;
      gap: 10px;
      margin: 16px 0;
    }

    .statBox {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 14px 5px;
      text-align: center;
    }

    .statBox b { font-size: 22px; }

    .statBox div {
      color: #777;
      font-size: 12px;
    }

    .levelCard {
      background: #1f2937;
      color: white;
      padding: 16px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 18px 0;
      position: relative;
      overflow: hidden;
    }

    .levelCard::after {
      content: "🐘";
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 90px;
      opacity: 0.20;
      pointer-events: none;
    }

    .levelCard > * {
      position: relative;
      z-index: 1;
    }

    .levelIcon {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #facc15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .levelCard h2 { margin: 0; }

    .progress {
      width: 130px;
      height: 7px;
      background: #6b7280;
      border-radius: 20px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress div {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #06b6d4, #8b5cf6);
    }

    .topFans {
      background: white;
      border-radius: 18px;
      padding: 16px;
      margin-top: 15px;
    }

    .topFans h3 {
      margin-top: 0;
      letter-spacing: 2px;
    }

    .noFans {
      background: #f3f0e7;
      border-radius: 14px;
      padding: 14px;
      color: #666;
      font-size: 13px;
    }

    .gameBtn {
      background: linear-gradient(90deg, #f59e0b, #facc15);
      color: white;
      padding: 18px;
      border-radius: 16px;
      margin: 18px 0;
      font-size: 25px;
      font-weight: bold;
    }

    .bottomBtns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cyan { background: #06b6d4 !important; }
    .pink { background: #fb7185 !important; }

    input[type="file"] {
      display: none;
    }
  </style>
</head>

<body>

  <div class="phone">

    <div class="cover">
      <img id="coverPhoto" src="">

      <div class="topNav">
        <div class="navBtn" onclick="goBack()">‹</div>
        <div class="navBtn">⚙</div>
      </div>
    </div>

    <div class="profileBody">

      <div class="profileTop">

        <div class="avatarSide">
          <div class="avatarBox">
            <img id="profileAvatar" src="">
            <div class="levelMini" id="levelMini">Lv.2</div>
          </div>

          <div id="profileId" class="profileId">
            ID:761343
          </div>
        </div>

        <div class="nameSide">
          <div class="nameFrame">
            <h1 id="profileUsername">mango</h1>
          </div>

          <div class="badgeRow">
            <span class="vipBadge">💎 VIP penglam 💎</span>
          </div>

          <div class="guildRow">
            <span class="guildBadge">Guild : Penglam</span>
          </div>
        </div>

      </div>

      <div class="actionRow">
        <button id="changeAvatarBtn" onclick="avatarInput.click()">Change Avatar</button>
        <button id="changeCoverBtn" onclick="coverInput.click()">Change Cover</button>
      </div>

      <input type="file" id="avatarInput" accept="image/*">
      <input type="file" id="coverInput" accept="image/*">

      <div class="tabs">
        <div class="tab active">Profile</div>
        <div class="tab">Honor wall</div>
      </div>

      <div class="coinRow">
        <div class="coinCard">
          🟡 Gold Coin
          <h2 class="goldText" id="goldCoins">0</h2>
        </div>

        <div class="coinCard">
          🥈 Silver Coin
          <h2 class="silverText" id="silverCoins">0</h2>
        </div>
      </div>

      <div class="stats">
        <div class="statBox">
          <b id="followers">0</b>
          <div>Followers</div>
        </div>

        <div class="statBox">
          <b id="following">0</b>
          <div>Following</div>
        </div>

        <div class="statBox">
          <b id="visitors">0</b>
          <div>Visitors</div>
        </div>
      </div>

      <div class="levelCard">
        <div class="levelIcon">👑</div>

        <div>
          <h2 id="levelName">User</h2>
          <b>Lv.2 • Rising Star</b>
          <div class="progress"><div></div></div>
        </div>
      </div>

      <div class="topFans">
        <h3>TOP FANS 👁 🏆</h3>

        <div id="topFansBox" class="noFans">
          No fans yet<br>
          Send gifts to become top fan
        </div>
      </div>

      <div class="gameBtn">🏅 Ludo 🎲</div>

      <div class="bottomBtns">
        <button id="editProfileBtn" class="cyan" onclick="editProfile()">Edit Profile</button>
        <button id="goLiveBtn" class="cyan" onclick="goLive()">Go Live</button>
        <button class="cyan" onclick="goHome()">Home</button>
        <button id="logoutBtn" class="pink" onclick="logout()">Logout</button>
      </div>

      <div style="height:35px;"></div>

    </div>

  </div>

  <script>
  const API_BASE = "http://localhost:3000";

  const params = new URLSearchParams(window.location.search);

  const profileUsername =
    params.get("username") ||
    params.get("user") ||
    params.get("room") ||
    localStorage.getItem("username") ||
    "mango";

  const loginUsername = localStorage.getItem("username");
  const isOwner = loginUsername === profileUsername;

  async function loadProfile() {
    try {
      const res = await fetch(`${API_BASE}/profile/${profileUsername}`);
      const user = await res.json();

      document.getElementById("profileUsername").textContent =
        user.username || profileUsername;

      document.getElementById("profileId").textContent =
        "ID:" + (user.userId || "761343");

      document.getElementById("profileAvatar").src =
        user.avatar || "https://via.placeholder.com/150";

      document.getElementById("coverPhoto").src =
        user.cover || "https://picsum.photos/600/300";

      document.getElementById("goldCoins").textContent =
        user.goldCoins || 0;

      document.getElementById("silverCoins").textContent =
        user.silverCoins || 0;

      document.getElementById("followers").textContent =
        user.followers || 0;

      document.getElementById("following").textContent =
        user.following || 0;

      document.getElementById("visitors").textContent =
        user.visitors || 0;

      document.getElementById("levelName").textContent =
        user.levelName || "User";

      if (!isOwner) {
        document.getElementById("changeAvatarBtn").style.display = "none";
        document.getElementById("changeCoverBtn").style.display = "none";
        document.getElementById("editProfileBtn").style.display = "none";
        document.getElementById("goLiveBtn").style.display = "none";
      }

    } catch (err) {
      console.log("Profile load error:", err);
    }
  }

  avatarInput.addEventListener("change", async () => {
    const file = avatarInput.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("avatar", file);
    formData.append("username", profileUsername);

    await fetch(`${API_BASE}/upload-avatar`, {
      method: "POST",
      body: formData
    });

    loadProfile();
  });

  coverInput.addEventListener("change", async () => {
    const file = coverInput.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("cover", file);
    formData.append("username", profileUsername);

    await fetch(`${API_BASE}/upload-cover`, {
      method: "POST",
      body: formData
    });

    loadProfile();
  });

  function goBack() {
    history.back();
  }

  function goHome() {
    window.location.href = "home.html";
  }

  function goLive() {
    window.location.href = "index.html?room=" + loginUsername;
  }

  function editProfile() {
    alert("Edit Profile coming soon");
  }

  function logout() {
    localStorage.clear();
    window.location.href = "home.html";
  }

  loadProfile();
</script>
</body>
</html>
