<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      min-height:100vh;
    }

    .navbar{
      background:#222;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      color:#00d4ff;
      font-size:24px;
      font-weight:bold;
    }

    .profile-card{
      width:350px;
      margin:40px auto;
      padding:25px;
      text-align:center;
      background:#1b1b1b;
      border-radius:18px;
      box-shadow:0 0 20px cyan;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      margin:20px 0;
    }

    .stats div{
      background:#222;
      padding:10px;
      border-radius:12px;
      width:30%;
    }

    button{
      margin:6px;
      padding:10px 14px;
      border:none;
      border-radius:8px;
      background:cyan;
      cursor:pointer;
      font-weight:bold;
    }

    input{
      padding:8px;
      border-radius:5px;
      border:none;
      margin:5px;
    }

    textarea{
      width:90%;
      height:70px;
      border-radius:8px;
      padding:10px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">🔥 Penglam Live</div>

  <div>
    <button onclick="goHome()">Home</button>
    <button onclick="goLive()">Go Live</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="profile-card">

  <img
    id="avatar"
    src="/default-avatar.png"
    width="130"
    height="130"
    alt="avatar"
    style="border-radius:50%; object-fit:cover;"
  >

  <h2 id="profileUsername">Loading...</h2>
  <p id="bio"></p>

  <button id="followBtn" onclick="followUser()">Follow</button>
  <button id="unfollowBtn" onclick="unfollowUser()" style="display:none;">Unfollow</button>

  <div class="stats">
    <div><h3 id="followers">0</h3><p>Followers</p></div>
    <div><h3 id="following">0</h3><p>Following</p></div>
    <div><h3 id="coins">0</h3><p>Coins</p></div>
  </div>

  <button onclick="addCoins(100)">+100 Coins</button>

  <h3>Edit Profile</h3>

  <input type="file" id="avatarFile">
  <button onclick="uploadAvatar()">Upload Photo</button>

  <br><br>

  <textarea id="bioInput" placeholder="Write your bio"></textarea>
  <br>
  <button onclick="updateProfile()">Save Bio</button>

  <h3>Send Gift</h3>

  <div id="giftBox">
    <button onclick="sendGift('Rose 🌹',10)">Rose 🌹 +10</button>
    <button onclick="sendGift('Heart 💗',50)">Heart 💗 +50</button>
    <button onclick="sendGift('Lion 🦁',1000)">Lion 🦁 +1000</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const currentUser = localStorage.getItem("username");
const params = new URLSearchParams(window.location.search);
const profileUser = params.get("user") || currentUser;

function goHome() {
  window.location.href = "/home.html";
}

function goLive() {
  if (!currentUser) {
    window.location.href = "/home.html";
    return;
  }

  window.location.href =
    "/index.html?room=" + encodeURIComponent(currentUser);
}

function logout() {
  localStorage.clear();
  window.location.href = "/home.html";
}

async function loadProfile() {
  if (!profileUser) {
    alert("Please login first");
    window.location.href = "/home.html";
    return;
  }

  const res = await fetch(`/profile/${profileUser}`);
  const data = await res.json();

  if (!data.success) {
    alert("Profile not found");
    return;
  }

  document.getElementById("profileUsername").innerText = data.username;

  const avatarImg = document.getElementById("avatar");
  avatarImg.src = data.avatar || "/default-avatar.png";
  avatarImg.onerror = function () {
    this.onerror = null;
    this.src = "/default-avatar.png";
  };

  document.getElementById("followers").innerText = data.followers || 0;
  document.getElementById("following").innerText = data.following || 0;
  document.getElementById("coins").innerText = data.coins || 0;
  document.getElementById("bio").innerText = data.bio || "";
  document.getElementById("bioInput").value = data.bio || "";

  const followBtn = document.getElementById("followBtn");
  const unfollowBtn = document.getElementById("unfollowBtn");

  if (!currentUser || currentUser === profileUser) {
    followBtn.style.display = "none";
    unfollowBtn.style.display = "none";
    return;
  }

  if ((data.followersList || []).includes(currentUser)) {
    followBtn.style.display = "none";
    unfollowBtn.style.display = "inline-block";
  } else {
    followBtn.style.display = "inline-block";
    unfollowBtn.style.display = "none";
  }
}

async function followUser() {
  const res = await fetch(`/follow/${profileUser}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      currentUser
    })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("followers").innerText = data.followers;
    document.getElementById("followBtn").style.display = "none";
    document.getElementById("unfollowBtn").style.display = "inline-block";
  } else {
    alert(data.message || "Follow failed");
  }
}

async function unfollowUser() {
  const res = await fetch(`/unfollow/${profileUser}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      currentUser
    })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("followers").innerText = data.followers;
    document.getElementById("followBtn").style.display = "inline-block";
    document.getElementById("unfollowBtn").style.display = "none";
  } else {
    alert(data.message || "Unfollow failed");
  }
}

async function updateProfile() {
  const bio = document.getElementById("bioInput").value;

  const res = await fetch(`/update-profile/${currentUser}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ bio })
  });

  const data = await res.json();

  if (data.success) {
    alert("Profile Updated");
    loadProfile();
  } else {
    alert("Update Failed");
  }
}

async function uploadAvatar() {
  const file = document.getElementById("avatarFile").files[0];

  if (!file) {
    alert("Please select photo");
    return;
  }

  const formData = new FormData();
  formData.append("avatar", file);
  formData.append("username", currentUser);

  const res = await fetch("/upload-avatar", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("avatar").src = data.avatar;
    localStorage.setItem("avatar", data.avatar);
    alert("Photo uploaded!");
  }
}

async function addCoins(amount) {
  const res = await fetch(`/add-coins/${profileUser}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("coins").innerText = data.coins;
  } else {
    alert("Failed");
  }
}

async function sendGift(giftName, amount) {
  const res = await fetch(`/send-gift/${profileUser}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ giftName, amount })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("coins").innerText = data.coins;
  }
}

socket.on("gift-received", data => {
  const giftBox = document.getElementById("giftBox");

  if (giftBox) {
    giftBox.innerHTML +=
      `<p>${data.username} received ${data.giftName} +${data.amount} coins</p>`;
  }
});

loadProfile();
</script>

</body>
</html>
