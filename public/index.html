<!DOCTYPE html>
<html>
<head>
    <title>Live Stream App</title>
    <style>
        body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

.navbar{
    background:#222;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#00d4ff;
    font-size:24px;
    font-weight:bold;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
}

.video-section{
    flex:3;
}

.chat-section{
    flex:1;
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
}

video{
    width:100%;
    max-width:900px;
    border-radius:15px;
    border:2px solid #00d4ff;
}

button{
    background:#00d4ff;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

input{
    padding:8px;
    border-radius:5px;
    border:none;
}
input{
    padding:10px;
    border-radius:6px;
    border:none;
    margin:5px;
}

button{
    padding:10px 15px;
    background:#00d4ff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00aacc;
}

#chatBox{
    background:#222;
    border:1px solid #00d4ff;
    border-radius:10px;
    padding:10px;
}
    </style>
</head>
<script>
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    document.getElementById("video").srcObject = stream;
  } catch (err) {
    console.error(err);
    alert("Camera access denied");
  }
} 
 function stopCamera() {
  const video = document.getElementById("video");

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }

  video.srcObject = null;
} 

</script>
<body>

<h1>My Live Stream</h1>

<h2>Register</h2>
<input type="text" id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">
<button onclick="window.location.href='/register.html'">
  Register
</button>

<hr>

<h2>Login</h2>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="window.location.href='/login.html'">
  Login
</button>

<hr>

<button id="startBtn" onclick="startCamera()">Start Live</button>
<button id="stopBtn" onclick="stopCamera()">Stop Live</button>

<br><br>

<video id="video" width="640" height="480" autoplay playsinline muted></video>





<h3>Viewers: <span id="viewerCount">0</span></h3>

<h3>Live Chat</h3>
<div id="chatBox" style="width:640px;height:200px;border:1px solid black;overflow:auto;"></div>

<br>

<input type="text" id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const params = new URLSearchParams(window.location.search);
const roomId = params.get("room") || "room1";
const isViewer = params.get("watch") === "1";

const username = localStorage.getItem("username");

if (!isViewer && !username) {
    alert("Please login first to go live");
    window.location.href = "/home.html";
}

window.addEventListener("load", () => {
  socket.emit("join-room", roomId);

   if (isViewer) {
   console.log("WATCHER MODE", roomId);
   socket.emit("watcher", roomId);

   const startBtn = document.getElementById("startBtn");
   const stopBtn = document.getElementById("stopBtn");

   if (startBtn) startBtn.style.display = "none";
   if (stopBtn) stopBtn.style.display = "none";
 }
});
let stream;
let peerConnection;

const configuration = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

const video = document.getElementById("video");

async function startCamera() {
    const username = localStorage.getItem("username");

    if (!username) {
        alert("Please login first to go live");
        window.location.href = "/home.html";
        return;
    }

    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        });

        video.srcObject = stream;

        socket.emit("broadcaster", {
            roomId,
            streamer: username,
            avatar: localStorage.getItem("avatar") || "/default-avatar.png"
        });
    peerConnection = new RTCPeerConnection(configuration);

    stream.getTracks().forEach(track => {
      peerConnection.addTrack(track, stream);
    });

    peerConnection.onicecandidate = event => {
      if (event.candidate) {
        socket.emit("ice-candidate", event.candidate);
      }
    };

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    console.log("Sending offer");
    socket.emit("offer", peerConnection.localDescription);

  } catch (err) {
    console.error(err);
    alert("Camera access denied");
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }

  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }

  video.srcObject = null;
}

socket.on("offer", async (description) => {
  if (!isViewer) return;

  console.log("Offer received", description);

  if (!description || !description.type) return;

  peerConnection = new RTCPeerConnection(configuration);

  peerConnection.ontrack = event => {
    video.srcObject = event.streams[0];
  };

  peerConnection.onicecandidate = event => {
    if (event.candidate) {
      socket.emit("ice-candidate", roomId, event.candidate);
    }
  };

  await peerConnection.setRemoteDescription(
    new RTCSessionDescription(description)
  );

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  socket.emit("answer", roomId, peerConnection.localDescription);
});

socket.on("answer", async (viewerId, description) => {
  if (isViewer) return;

  if (!peerConnection) return;

  if (peerConnection.signalingState !== "have-local-offer") {
    console.log("Ignore answer, state:", peerConnection.signalingState);
    return;
  }

  await peerConnection.setRemoteDescription(
    new RTCSessionDescription(description)
  );
});

socket.on("ice-candidate", async (id, candidate) => {
    if (!candidate || !peerConnection) return;

    try {
        await peerConnection.addIceCandidate(candidate);
    } catch (err) {
        console.error("ICE ERROR", err);
    }
});
socket.on("viewer-count", count => {
    document.getElementById("viewerCount").innerText = count;
});
socket.on("watcher", async (viewerId) => {
  console.log("Watcher connected, sending offer", viewerId);

  if (!stream) return;

  peerConnection = new RTCPeerConnection(configuration);

  stream.getTracks().forEach(track => {
    peerConnection.addTrack(track, stream);
  });

  peerConnection.onicecandidate = event => {
    if (event.candidate) {
      socket.emit("ice-candidate", viewerId, event.candidate);
    }
  };

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  socket.emit("offer", viewerId, peerConnection.localDescription);
});
socket.on("chat-message", data => {
    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML +=
        `<p><b>${data.user}</b>: ${data.message}</p>`;
});
function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();
    const username = localStorage.getItem("username");

    if (!message) return;

    if (isViewer && !username) {
        alert("Please login to chat");
        return;
    }

    if (!username) {
        alert("Please login first");
        return;
    }

    socket.emit("chat-message", {
        roomId: roomId,
        user: username,
        message: message
    });

    input.value = "";
}

</script>

</body>
</html>
