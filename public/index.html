<!DOCTYPE html>
<html>
<head>
    <title>Live Stream App</title>
</head>
<body>

<h1>My Live Stream</h1>

<h2>Register</h2>
<input type="text" id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<button onclick="startCamera()">Start Live</button>
<button onclick="stopCamera()">Stop Live</button>

<br><br>

<video id="video" width="640" height="480" autoplay playsinline muted></video>

<h3>Viewers: <span id="viewerCount">0</span></h3>

<h3>Live Chat</h3>
<div id="chatBox" style="width:640px;height:200px;border:1px solid black;overflow:auto;"></div>

<br>

<input type="text" id="chatInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
let stream;
const video = document.getElementById("video");
const socket = io();

const peerConnections = {};
const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

async function register() {
const username = document.getElementById("regUser").value;
const password = document.getElementById("regPass").value;
    const res = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    alert(data.message);
}

async function login() {
    const username = document.getElementById("loginUser").value;
    const password = document.getElementById("loginPass").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
        alert("Login Success");
    } else {
        alert("Login Failed");
    }
}

async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    });

    video.srcObject = stream;
    socket.emit("broadcaster");
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }

    Object.keys(peerConnections).forEach(id => {
        peerConnections[id].close();
        delete peerConnections[id];
    });
}

socket.on("watcher", async (id) => {
    const peerConnection = new RTCPeerConnection(config);
    peerConnections[id] = peerConnection;

    stream.getTracks().forEach(track => {
        peerConnection.addTrack(track, stream);
    });

    peerConnection.onicecandidate = event => {
        if (event.candidate) {
            socket.emit("candidate", id, event.candidate);
        }
    };

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    socket.emit("offer", id, peerConnection.localDescription);
});

socket.on("offer", async (id, description) => {
    const peerConnection = new RTCPeerConnection(config);
    peerConnections[id] = peerConnection;

    peerConnection.ontrack = event => {
        video.srcObject = event.streams[0];
    };

    peerConnection.onicecandidate = event => {
        if (event.candidate) {
            socket.emit("candidate", id, event.candidate);
        }
    };

    await peerConnection.setRemoteDescription(description);

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    socket.emit("answer", id, peerConnection.localDescription);
});

socket.on("answer", (id, description) => {
    peerConnections[id].setRemoteDescription(description);
});

socket.on("candidate", (id, candidate) => {
    peerConnections[id].addIceCandidate(new RTCIceCandidate(candidate));
});

socket.on("broadcaster", () => {
    socket.emit("watcher");
});
window.addEventListener("load", () => {
    socket.emit("watcher");
});
socket.on("disconnectPeer", id => {
    if (peerConnections[id]) {
        peerConnections[id].close();
        delete peerConnections[id];
    }
});

socket.on("viewer-count", count => {
    document.getElementById("viewerCount").innerText = count;
});

socket.on("chat-message", data => {
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML += `<p><b>${data.user}</b>: ${data.message}</p>`;
});

function sendMessage() {
    const input = document.getElementById("chatInput");

    socket.emit("chat-message", {
        user: document.getElementById("loginUser").value || "Guest",
        message: input.value
    });

    input.value = "";
}

window.onunload = window.onbeforeunload = () => {
    socket.close();
};
</script>

</body>
</html>
