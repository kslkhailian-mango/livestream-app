<!DOCTYPE html>
<html>
<head>
    <title>Live Stream App</title>
    <style>
        body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

.navbar{
    background:#222;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#00d4ff;
    font-size:24px;
    font-weight:bold;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
}

.video-section{
    flex:3;
}

.chat-section{
    flex:1;
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
}

video{
    width:100%;
    max-width:900px;
    border-radius:15px;
    border:2px solid #00d4ff;
}

button{
    background:#00d4ff;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

input{
    padding:8px;
    border-radius:5px;
    border:none;
}
input{
    padding:10px;
    border-radius:6px;
    border:none;
    margin:5px;
}

button{
    padding:10px 15px;
    background:#00d4ff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00aacc;
}

#chatBox{
    background:#222;
    border:1px solid #00d4ff;
    border-radius:10px;
    padding:10px;
}
    </style>
</head>
<body>

<h1>My Live Stream</h1>

<h2>Register</h2>
<input type="text" id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<button onclick="startCamera()">Start Live</button>
<button onclick="stopCamera()">Stop Live</button>

<br><br>

<video id="video" width="640" height="480" autoplay playsinline muted></video>





<h3>Viewers: <span id="viewerCount">0</span></h3>

<h3>Live Chat</h3>
<div id="chatBox" style="width:640px;height:200px;border:1px solid black;overflow:auto;"></div>

<br>

<input type="text" id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
let stream;
const video = document.getElementById("video");
const socket = io();
const params = new URLSearchParams(window.location.search);
const roomId = params.get("room") || "main";

socket.emit("join-room", roomId);
const peerConnections = {};
const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

async function register() {
const username = document.getElementById("regUser").value;
const password = document.getElementById("regPass").value;
    const res = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    alert(data.message);
}

async function login() {
    const username = document.getElementById("loginUser").value;
    const password = document.getElementById("loginPass").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
        alert("Login Success");
    } else {
        alert("Login Failed");
    }
}

async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    });

    video.srcObject = stream;
    socket.emit("broadcaster", roomId);
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }

    Object.keys(peerConnections).forEach(id => {
        peerConnections[id].close();
        delete peerConnections[id];
    });
}

socket.on("watcher", async (id) => {
    const peerConnection = new RTCPeerConnection(config);
    peerConnections[id] = peerConnection;

    stream.getTracks().forEach(track => {
        peerConnection.addTrack(track, stream);
    });

    peerConnection.onicecandidate = event => {
        if (event.candidate) {
            socket.emit("candidate", id, event.candidate);
        }
    };

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    socket.emit("offer", id, peerConnection.localDescription);
});

socket.on("offer", async (id, description) => {
    const peerConnection = new RTCPeerConnection(config);
    peerConnections[id] = peerConnection;

    peerConnection.ontrack = event => {
        video.srcObject = event.streams[0];
    };

    peerConnection.onicecandidate = event => {
        if (event.candidate) {
            socket.emit("candidate", id, event.candidate);
        }
    };

    await peerConnection.setRemoteDescription(description);

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    socket.emit("answer", id, peerConnection.localDescription);
});

socket.on("answer", (id, description) => {
    peerConnections[id].setRemoteDescription(description);
});

socket.on("candidate", (id, candidate) => {
    peerConnections[id].addIceCandidate(new RTCIceCandidate(candidate));
});

socket.on("broadcaster", () => {
    socket.emit("watcher", roomId);
});

window.addEventListener("load", () => {
    socket.emit("watcher", roomId);
});
socket.on("disconnectPeer", id => {
    if (peerConnections[id]) {
        peerConnections[id].close();
        delete peerConnections[id];
    }
});

socket.on("viewer-count", count => {
    document.getElementById("viewerCount").innerText = count;
});

socket.on("chat-message", data => {
    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML +=
        `<p><b>${data.username}</b>: ${data.message}</p>`;
});

const username = "test1";

function sendMessage() {
    const message =
        document.getElementById("messageInput").value;

    socket.emit("chat-message", {
        username: username,
        message: message
    });

    document.getElementById("messageInput").value = "";
}

</script>

</body>
</html>
